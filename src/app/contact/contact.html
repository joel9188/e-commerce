<section class="em-contact-page">
  <div class="em-contact-container">
    
    <div class="em-contact-info">
      <span class="em-subtitle">Get in Touch</span>
      <h1 class="em-contact-title">We’re here to help you.</h1>
      <p class="em-contact-desc">
        Have a question about an order or a product? Our team is available 
        Monday through Friday, 9am – 5pm.
      </p>

      <div class="em-info-item">
        <span class="em-info-label">Email us</span>
        <a href="mailto:support@easymart.com" class="em-info-link">support@easymart.com</a>
      </div>

      <div class="em-info-item">
        <span class="em-info-label">Visit us</span>
        <address class="em-info-text">
          123 Commerce Way, Suite 100<br>
          Design District, NY 10001
        </address>
      </div>
    </div>

    <div class="em-contact-form-wrapper">
      <form class="em-contact-form">
        <div class="em-input-group">
          <label>Full Name</label>
          <input type="text" placeholder="John Doe" required>
        </div>

        <div class="em-input-group">
          <label>Email Address</label>
          <input type="email" placeholder="john@example.com" required>
        </div>

        <div class="em-input-group">
          <label>Subject</label>
          <select>
            <option>Order Status</option>
            <option>Returns & Exchanges</option>
            <option>Product Inquiry</option>
            <option>Other</option>
          </select>
        </div>

        <div class="em-input-group">
          <label>Message</label>
          <textarea rows="5" placeholder="How can we help?"></textarea>
        </div>

        <button type="submit" class="em-submit-btn">Send Message</button>
      </form>
    </div>

  </div>
</section>
